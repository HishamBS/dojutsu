# dojutsu.toml — Single Source of Truth for the entire pipeline
# Generated by setup.sh, customizable by user
# Re-generate with: bash setup.sh --reconfigure
#
# Pipeline code reads ALL settings from this file.
# Zero hardcoded values in Python scripts or prompts.

[pipeline]
batch_size = 30                     # files per scanner agent dispatch
max_parallel_agents = 3             # max concurrent agent dispatches
grep_min_patterns_per_lang = 20     # warn if language has fewer patterns
signature_extraction = true         # extract function signatures before LLM scan
session_token_budget = 500000       # auto-pause when total dispatch tokens exceed this
                                    # Claude Max: 500000, Claude Pro: 250000, Codex: 500000
                                    # setup.sh sets this based on your subscription
progress_prefix = "[dojutsu]"       # prefix for progress output lines

[models]
# Model tiers — pipeline code references TIERS, never model IDs directly.
# To update models: edit tiers below OR run setup.sh --reconfigure.

[models.tiers.cheap]
# For: scanners, aggregators — pattern detection, simple tasks
claude = "claude-haiku-4-5"         # $1/MTok input
codex = "gpt-5.4-mini"             # $0.75/MTok input
gemini = "gemini-3.1-flash-lite"   # cheapest Gemini

[models.tiers.mid]
# For: enrichers, analysts, fixers, verifiers — code understanding, reasoning
claude = "claude-sonnet-4-6"        # $3/MTok input
codex = "gpt-5.4-mini"             # $0.75/MTok input (Codex mid = mini with high effort)
gemini = "gemini-3-flash"          # mid-tier Gemini

[models.tiers.premium]
# For: narrator, master-hub — premium writing quality (max 2 dispatches per run)
claude = "claude-opus-4-6"          # $5/MTok input
codex = "gpt-5.4"                  # $2.50/MTok input
gemini = "gemini-3.1-pro"          # premium Gemini

# Task → tier mapping
[models.assignments]
scanner = "cheap"
aggregator = "cheap"
enricher = "mid"
layer_generator = "mid"
master_hub_generator = "premium"
cross_cutting_generator = "mid"
impact_analyst = "mid"
narrator = "premium"
scorecard_generator = "mid"
deployment_planner = "mid"
fixer = "mid"
verifier = "mid"                    # MUST use different engine from builder

[dispatch]
mode = "native"                     # "native" or "agent-mux" — set by setup.sh
default_engine = "claude"           # which engine the user is running in
available_engines = ["claude"]      # detected by setup.sh
verifier_engine = "claude"          # auto-selected: different from default_engine when possible

[timeouts]
scanner = 600
enricher = 600
analyst = 1200
narrator = 1800
fixer = 600
verifier = 1200

[always_scan_layers]
# Layers that always get LLM-scanned even if grep finds nothing
# These contain business logic where semantic issues hide
layers = [
    "services",
    "middleware",
    "auth",
    "security",
    "api-routes",
    "handlers",
    "routes",
]

[always_scan_files]
# File patterns that always get scanned regardless of layer
patterns = [
    "main.ts", "main.py", "main.go", "main.rs",
    "app.ts", "app.py",
    "server.ts", "server.py", "server.go",
    "index.ts",  # only at project root or src/ root
]
min_imports = 5  # files with this many imports are always scanned (high fan-in)

[structural_skip]
# Files that are structurally trivial — skip LLM reading
# These are detected by content analysis, not name patterns
extensions_always_skip = [".json", ".yaml", ".yml", ".toml", ".css", ".scss", ".less", ".env.example"]
generated_markers = ["// Generated", "/* auto-generated */", "// Code generated", "// DO NOT EDIT"]
